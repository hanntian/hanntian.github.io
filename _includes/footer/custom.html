<!-- Right floating TOC: fixed width + sticky (theme width vars are `auto`) -->
<style>
  @media (min-width: 925px) {
    /* Post pages: no left author sidebar -> content uses the full width */
    .post-layout .page {
      width: 100% !important;
      margin: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
      float: none !important;
    }
    /* Posts WITH a table of contents: two-column (left TOC + right body).
       One shared left gutter so title and body line up exactly. */
    .post-layout.has-toc .page__inner-wrap {
      position: relative;
      padding-left: 17em;
    }
    .post-layout.has-toc .page__inner-wrap > header,
    .post-layout.has-toc .page__content { padding-left: 0; position: static; }
    /* TOC sits in the left gutter; body never wraps under it */
    .post-layout.has-toc .sidebar__right {
      position: absolute;
      left: 0;
      top: 0;
      width: 15em;
      margin: 0;
      float: none;
    }
  }
  /* Left TOC: clean index, original heading text (no all-caps), small font */
  .toc { text-transform: none; letter-spacing: normal; }
  .toc .nav__title { font-size: 0.8rem; text-transform: none; letter-spacing: normal; }
  .toc .toc__menu a { font-size: 0.72rem; line-height: 1.4; padding: 0.35rem 0.8rem; }
  .toc .toc__menu li ul > li a { padding-left: 1.6rem; font-size: 0.68rem; }

  /* More compact post text for laptop screens (Notion-like density) */
  .page__content { font-size: 16px; line-height: 1.5; }
  .page__content p,
  .page__content li { margin-bottom: 0.8em; }
  .page__content li { margin-top: 0.2em; }
  .post-layout .page__title { font-size: 2em; }
  .page__content h1 { font-size: 1.4em; }
  .page__content h2 { font-size: 1.25em; }
  .page__content h3 { font-size: 1.1em; }
  .page__content h4 { font-size: 1em; }

  /* Tighter spacing between headings and surrounding text */
  .page__content h1, .page__content h2, .page__content h3,
  .page__content h4, .page__content h5, .page__content h6 {
    margin-top: 1.2em;
    margin-bottom: 0.4em;
  }
</style>

<!-- Global image handling: size + Notion-style caption -> figcaption -->
<style>
  /* Fit every in-content image to the column, cap its size, center it */
  .page__content img {
    display: block;
    max-width: min(100%, 720px);
    max-height: 75vh;
    width: auto;
    height: auto;
    margin: 1.2em auto;
  }
  /* Auto-built figures from the Notion "image + duplicated caption" pattern */
  .page__content .auto-figure { margin: 1.5em auto; text-align: center; max-width: 720px; }
  .page__content .auto-figure img { margin: 0 auto; }
  .page__content .auto-figure figcaption {
    margin-top: 0.5em;
    font-size: 0.82em;
    line-height: 1.5;
    color: var(--global-text-color-light, #6f777d);
  }
</style>
<script>
  /* Runs synchronously (before deferred MathJax) so any math inside captions
     is typeset normally after this restructuring. */
  (function () {
    var content = document.querySelector('.page__content');
    if (!content) return;
    var imgs = Array.prototype.slice.call(content.querySelectorAll('img'));
    imgs.forEach(function (img) {
      if (img.closest('figure')) return;            // already a manual <figure>
      var p = img.parentElement;
      if (!p) return;
      var alt = (img.getAttribute('alt') || '').replace(/\s+/g, ' ').trim();
      if (!alt || alt.toLowerCase() === 'image.png') return;
      var next = p.nextElementSibling;
      if (!next) return;
      // Notion captions land as a <p>, or — when indented — as a <pre> code block.
      if (next.tagName !== 'P' && next.tagName !== 'PRE') return;
      var ntext = (next.textContent || '').replace(/\s+/g, ' ').trim();
      if (ntext !== alt) return;                     // only the duplicate-caption case
      var fig = document.createElement('figure');
      fig.className = 'auto-figure';
      p.parentNode.insertBefore(fig, p);
      fig.appendChild(img);                          // move image into the figure
      var cap = document.createElement('figcaption');
      cap.textContent = alt;                         // clean text; any $...$ is typeset by MathJax
      fig.appendChild(cap);
      next.parentNode.removeChild(next);             // drop the duplicate paragraph / code block
      if (p.children.length === 0 && p.textContent.trim() === '') p.parentNode.removeChild(p);
    });
  })();
</script>
